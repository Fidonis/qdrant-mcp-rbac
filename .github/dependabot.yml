version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "type: chore"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Bundle non-breaking Python updates into one PR; majors stay separate
      # so a breaking library bump gets reviewed on its own.
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "type: chore"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Action interfaces rarely break across majors, so bundle everything
      # (incl. majors) into a single weekly PR to cut review noise.
      github-actions:
        patterns:
          - "*"
