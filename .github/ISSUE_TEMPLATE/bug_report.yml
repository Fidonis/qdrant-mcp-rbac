name: Bug report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can investigate efficiently.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the issue.
      placeholder: When I do X, Y happens — but I expected Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `docker compose up -d`
        2. Navigate to ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: v0.6.0 / 0ad5fae
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, deployment context.
      placeholder: |
        - OS: macOS 14
        - Docker: 24.0.6
        - Behind reverse proxy: yes/no
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs or error output.
      render: shell
    validations:
      required: false
