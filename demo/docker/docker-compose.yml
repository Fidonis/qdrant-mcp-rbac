services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-rbac-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    env_file:
      - ../../src/.env
    environment:
      # Enables JWT-based RBAC. The api-key here doubles as the JWT signing secret.
      QDRANT__SERVICE__API_KEY: ${QDRANT_JWT_SECRET:-change-me-to-a-strong-secret}
      QDRANT__SERVICE__JWT_RBAC: "true"
    volumes:
      - qdrant_storage:/qdrant/storage

  # keycloak:
  #   image: quay.io/keycloak/keycloak:25.0
  #   container_name: qdrant-rbac-keycloak
  #   command: ["start-dev"]
  #   environment:
  #     KEYCLOAK_ADMIN: admin
  #     KEYCLOAK_ADMIN_PASSWORD: admin
  #   ports:
  #     - "8080:8080"

volumes:
  qdrant_storage:
